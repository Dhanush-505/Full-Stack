<!DOCTYPE html>
<html>
    <head>
        <title>Bootstrap Example</title>
        <style>
            *{
                margin:0;
                padding:10px;
                box-sizing:border-box;
            }
            .card-container{
                display:flex;
                gap:20px;
                background-color:lightslategray;
                justify-content: space-between;
                padding:20px;
                border-radius:20px;
            }
            .card{
                width:200px;
                height:200px;
                background-color:rgb(196, 205, 215);
                display:flex;
                flex-direction:column;
                align-items:center;
                justify-content:center;
                border-radius: 20px;
                font-size: 10px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            }
            .card h2{
                font-size: 20px;
            }
            .card p{
                font-size: 15px;
                font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            }
        </style>
    </head>
    <body>
        <div class="card-container">
        </div>    
        <script>
            const person1={
                name:"Md Salman Bhai",
                age:22,
                city:"Kakinada"
            }
            const person2={
                name:"M Dhanush",
                age:21,
                city:"vizag"
            }
            const person3={
                name:"M Abhiram",
                age:22,
                city:"vizag"
            }
            document.querySelector(".card-container").innerHTML=`
            <div class="card">
                <h2>${person1.name}</h2>
                <p>Age:${person1.age}</p>
                <p>City:${person1.city}</p>
            </div>
            <div class="card">
                <h2>${person2.name}</h2>
                <p>Age:${person2.age}</p>
                <p>City:${person2.city}</p>
            </div>
            <div class ="card">
                <h2>${person3.name}</h2>
                <p>Age:${person3.age}</p>
                <p>City:${person3.city}</p>
                </div>`
        </script>
    </body>
</html>
