<!DOCTYPE html>
<html lang="en">
<head>
  <title>Visiting Card </title>
  <style>
    body {
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .visiting-card {
      display:flex;
      gap:20px;
      background-color:lightslategray;
      justify-content: space-between;
      padding:20px;
      border-radius:20px;
    }
    .card img {
      margin-top: 20px;
      width: 60%;
      height: 250px;
      object-fit:fill;
      border-radius:20px;
    }
    .card {
      width:200px;
      height:200px;
      background-color:rgb(196, 205, 215);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      border-radius: 20px;
      font-size: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    .card h2 {
      font-weight: 700;
      color: #333;
      margin-bottom: 0px;
    }
    .card p {
      color: #777;
      font-size: 0.9rem;
      margin-bottom: 0px;
    }
  </style>
</head>
<body>

  <div class="visiting-card">

  </div>
    <script>
      
      const person2={
        name:"Md Salman Bhai",
        age:22,
        city:"Kakinada",
        Image: "assets/vc.jpg"
      }
      const person1={
        name:"M Dhanush",
        age:21,
        city:"vizag"
      }
      const image={
        Image:"assets/mini-1.jpg"
      }
      const person3={
        name:"M Abhiram",
        age:22,
        city:"vizag"
      }


      document.querySelector(".visiting-card").innerHTML=`
          <img src="${person2.Image}" alt="Image" class="image">
           <div class="card">
        </div>
        <div class="card">
          <h2 class=>${person1.name}</h2>
          <p >Age: ${person1.age}</p>
          <p >City: ${person1.city}</p>
        </div>
        </div>`
    </script>
</body>
</html>
